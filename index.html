<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary -->
    <title>LexRise — SAT English RPG</title>
    <meta name="description" content="Gamified SAT English prep — Vocabulary, Grammar, and Reading Comprehension. Level up your skills daily." />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/LexRise/manifest.json" />

    <!-- Theme color (browser chrome + Android status bar) -->
    <meta name="theme-color" content="#030712" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/LexRise/favicon.svg" />

    <!-- ── Typography ────────────────────────────────────────
         Inter for body/UI, Cinzel for display (dungeon names, level-up
         titles, boss chrome). preconnect cuts ~200ms off first paint. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- ── iOS / Apple PWA ────────────────────────────────── -->
    <!-- Makes it feel native when added to home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LexRise" />
    <link rel="apple-touch-icon" href="/LexRise/apple-touch-icon.svg" />

    <!-- ── Android / Chrome ──────────────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="LexRise" />

    <!-- ── Open Graph (share previews) ───────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="LexRise — SAT English RPG" />
    <meta property="og:description" content="Gamified SAT prep — battle bosses, forge vocabulary, master grammar." />
    <meta property="og:image" content="/LexRise/icon-512.svg" />

    <!-- Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // import.meta.env.BASE_URL is injected by Vite and equals
          // '/' locally and '/repo-name/' on GitHub Pages.
          navigator.serviceWorker.register(import.meta.env.BASE_URL + 'sw.js')
            .catch(err => console.log('SW registration failed:', err));
        });
      }
    </script>
    <script type="module" crossorigin src="/LexRise/assets/index-HmAFLC7t.js"></script>
    <link rel="stylesheet" crossorigin href="/LexRise/assets/index-CcH6epYP.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
